<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小游戏 - 多语言学习园地</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            padding: 40px 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .top-bar {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .page-title {
            color: white;
            font-size: 28px;
            font-weight: 700;
        }

        .page-title .sub {
            font-size: 16px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.5);
            margin-left: 10px;
        }

        .games-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 35px 30px;
            width: 280px;
            text-align: center;
            transition: all 0.35s ease;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        }

        .game-card:hover {
            transform: translateY(-8px) scale(1.02);
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.25);
        }

        .game-card .game-icon {
            font-size: 52px;
            margin-bottom: 12px;
        }

        .game-card .game-name {
            font-size: 22px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 6px;
        }

        .game-card .game-hint {
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
        }

        .game-card .play-btn {
            display: inline-block;
            margin-top: 18px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 8px 28px;
            border-radius: 40px;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .game-card .play-btn:hover {
            opacity: 0.8;
        }

        .empty-msg {
            color: rgba(255, 255, 255, 0.5);
            font-size: 20px;
            text-align: center;
            padding: 80px 20px;
        }

        footer {
            text-align: center;
            margin-top: 60px;
            color: rgba(255, 255, 255, 0.2);
            font-size: 13px;
        }

        @media (max-width: 600px) {
            .game-card {
                width: 100%;
                padding: 25px 20px;
            }
            .page-title {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="top-bar">
            <a href="javascript:history.back()" class="back-btn">← 返回</a>
            <h1 class="page-title" id="pageTitle">
                🎮 小游戏 <span class="sub" id="levelSub"></span>
            </h1>
        </div>

        <div class="games-grid" id="gamesGrid">
        </div>

        <footer>🧧 快乐学习 · 每天进步一点点</footer>
    </div>

    <script>
        const CONFIG = {
            zh: {
                name: '中文',
                emoji: '🐉',
                levels: [
                    {
                        id: 'L1',
                        name: '第一课',
                        desc: '基础汉字与拼音',
                        icon: '🀄',
                        games: [
                            { name: '汉字配对', file: 'game1.html' },
                            { name: '听力挑战', file: 'game2.html' },
                            { name: '笔画顺序', file: 'game3.html' },
                        ]
                    },
                    {
                        id: 'L2',
                        name: '第二课',
                        desc: '日常用语与词汇',
                        icon: '📖',
                        games: [
                            { name: '词语接龙', file: 'game4.html' },
                            { name: '句子排序', file: 'game5.html' },
                            { name: '看图识字', file: 'game6.html' },
                        ]
                    },
                    {
                        id: 'L3',
                        name: '第三课',
                        desc: '成语与故事',
                        icon: '📜',
                        games: [
                            { name: '成语填空', file: 'game7.html' },
                            { name: '故事排序', file: 'game8.html' },
                        ]
                    }
                ]
            },
            es: {
                name: 'Español',
                emoji: '💃',
                levels: [
                    {
                        id: 'L1',
                        name: 'Nivel 1',
                        desc: 'Saludos y vocabulario básico',
                        icon: '👋',
                        games: [
                            { name: 'Saludos', file: 'game9.html' },
                            { name: 'Números', file: 'game10.html' },
                            { name: 'Colores', file: 'game11.html' },
                        ]
                    },
                    {
                        id: 'L2',
                        name: 'Nivel 2',
                        desc: 'Frases cotidianas',
                        icon: '💬',
                        games: [
                            { name: 'La familia', file: 'game12.html' },
                            { name: 'La comida', file: 'game13.html' },
                        ]
                    },
                    {
                        id: 'L3',
                        name: 'Nivel 3',
                        desc: 'Gramática básica',
                        icon: '📚',
                        games: [
                            { name: 'Verbos', file: 'game14.html' },
                            { name: 'Adjetivos', file: 'game15.html' },
                            { name: 'Pasado simple', file: 'game16.html' },
                            { name: 'Futuro', file: 'game17.html' },
                        ]
                    }
                ]
            }
        };

        function getQueryParam(param) {
            const url = new URL(window.location.href);
            return url.searchParams.get(param);
        }

        const langCode = getQueryParam('lang');
        const levelId = getQueryParam('level');

        if (!langCode || !CONFIG[langCode]) {
            window.location.href = 'index.html';
        }

        const langData = CONFIG[langCode];
        const levelData = langData.levels.find(l => l.id === levelId);

        if (!levelData) {
            window.location.href = `level.html?lang=${langCode}`;
        }

        document.getElementById('pageTitle').innerHTML =
            `🎮 ${levelData.name} <span class="sub">${langData.emoji} ${langData.name}</span>`;

        const grid = document.getElementById('gamesGrid');
        const games = levelData.games;

        if (games.length === 0) {
            grid.innerHTML = `<div class="empty-msg">📭 这个等级还没有小游戏，敬请期待！</div>`;
        } else {
            const emojis = ['🎯', '🧩', '🎵', '✍️', '📝', '🎲', '🃏', '🔤', '🎪', '🌈', '⭐', '🎨'];
            games.forEach((game, index) => {
                const card = document.createElement('div');
                card.className = 'game-card';
                const emoji = emojis[index % emojis.length];

                card.innerHTML = `
                    <div class="game-icon">${emoji}</div>
                    <div class="game-name">${game.name}</div>
                    <div class="game-hint">点击下方按钮开始</div>
                    <button class="play-btn" onclick="window.open('${game.file}', '_blank')">▶ 开始游戏</button>
                `;

                grid.appendChild(card);
            });
        }
    </script>

</body>
</html>
