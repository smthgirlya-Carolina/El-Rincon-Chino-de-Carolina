<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>多语言学习园地</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        .site-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .site-header .logo {
            font-size: 72px;
            display: block;
            margin-bottom: 10px;
        }

        .site-header h1 {
            font-size: 44px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 2px;
            margin-bottom: 4px;
        }

        .site-header .subtitle {
            font-size: 28px;
            font-weight: 600;
            color: #f0e6d3;
            letter-spacing: 1px;
            margin-bottom: 14px;
        }

        .site-header .slogan-es {
            font-size: 20px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 6px;
        }

        .site-header .slogan-zh {
            font-size: 20px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 16px;
        }

        .site-header .prompt {
            font-size: 17px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 1px;
        }

        .language-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
        }

        .language-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 32px;
            padding: 50px 60px;
            width: 320px;
            text-align: center;
            cursor: pointer;
            transition: all 0.35s ease;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            text-decoration: none;
        }

        .language-card:hover {
            transform: translateY(-12px) scale(1.02);
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .language-card .flag {
            font-size: 72px;
            margin-bottom: 15px;
        }

        .language-card .lang-name {
            font-size: 32px;
            font-weight: 700;
            color: #ffffff;
        }

        .language-card .lang-desc {
            color: rgba(255, 255, 255, 0.6);
            font-size: 15px;
            margin-top: 8px;
        }

        .language-card .level-count {
            display: inline-block;
            margin-top: 18px;
            background: rgba(255, 255, 255, 0.12);
            padding: 6px 20px;
            border-radius: 40px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }

        footer {
            text-align: center;
            margin-top: 60px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 14px;
        }

        @media (max-width: 700px) {
            .language-card {
                width: 100%;
                padding: 40px 30px;
            }
            .site-header h1 {
                font-size: 32px;
            }
            .site-header .subtitle {
                font-size: 22px;
            }
            .site-header .slogan-es,
            .site-header .slogan-zh {
                font-size: 17px;
            }
            .site-header .prompt {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="site-header">
            <span class="logo">🌍</span>
            <h1>多语言学习园地</h1>
            <div class="subtitle">Bienvenidos al Rincón Chino de Carolina</div>
            <div class="slogan-es">Que el aprendizaje del chino sea una diversión</div>
            <div class="slogan-zh">让西语学习成为一种乐趣</div>
            <div class="prompt">Escoja el idioma · 请选择一种语言</div>
        </div>

        <div class="language-grid">
            <a href="level.html?lang=zh" class="language-card">
                <div class="flag">🐉</div>
                <div class="lang-name">中文 Chino</div>
                <div class="lang-desc">Saludos y Pronombres · Familias y Profesiones · Numeros y Fechas</div>
                <span class="level-count">📚 3 个等级</span>
            </a>

            <a href="level.html?lang=es" class="language-card">
                <div class="flag">💃</div>
                <div class="lang-name">西班牙语 Español</div>
                <div class="lang-desc">动词现在时 · 动词副动词和过去分词 · 词汇</div>
                <span class="level-count">📚 3 个等级</span>
            </a>
        </div>

        <footer>🧧 快乐学习 · 每天进步一点点</footer>
    </div>

</body>
</html>
